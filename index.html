<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Taco-Vaidor — a browser Space Invaders style game with octopus enemies, giant squid bosses, life potions and procedural chiptune music." />
  <meta name="theme-color" content="#0b0e17" />
  <title>Taco-Vaidor</title>

  <!-- Favicon & app icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />

  <!-- iPad / iPhone home-screen icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="./icons/apple-touch-icon-167x167.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="./icons/apple-touch-icon-152x152.png" />

  <!-- iOS standalone web-app behaviour -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Taco-Vaidor" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <h1 class="title">🌮 TACO-VAIDOR 🦑</h1>

    <div id="stage">
      <canvas id="game" width="800" height="600"></canvas>

      <!-- Start overlay (browsers require a user gesture to start audio) -->
      <div id="start-overlay" class="overlay">
        <div class="panel">
          <h2>TACO-VAIDOR</h2>
          <p>Octopuses invade and giant squids guard the gates.<br />Blast through 7 stages and survive!</p>
          <ul class="controls">
            <li><b>← →</b> / <b>A D</b> — Move</li>
            <li><b>Space</b> — Shoot</li>
            <li><b>↑ ↓</b> — Volume</li>
            <li><b>M</b> — Mute</li>
            <li><b>R</b> — Restart (after game over)</li>
          </ul>
          <button id="start-btn" type="button">▶ START</button>
        </div>
      </div>
    </div>

    <p class="hint">
      Move: <b>← →</b> / <b>A D</b> &nbsp;·&nbsp; Shoot: <b>Space</b> &nbsp;·&nbsp;
      Volume: <b>↑ ↓</b> &nbsp;·&nbsp; Mute: <b>M</b> &nbsp;·&nbsp; Restart: <b>R</b>
    </p>
  </div>

  <script src="./js/audio.js"></script>
  <script src="./js/game.js"></script>
</body>
</html>
